services:
  - type: web
    name: clinical-simulator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && npm install && npm run build && python scripts/download_data.py
    startCommand: cd backend-python && python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DASHSCOPE_API_KEY
        sync: false
